<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithRedirect, signInWithPopup, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, signInWithPopup, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, signInWithPopup, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query } = window.Firebase || {};

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB--thdJ-fp8OfQriXU6r7qnutWEPLN86Y",
            authDomain: "cashproject-9123e.firebaseapp.com",
            projectId: "cashproject-9123e",
            storageBucket: "cashproject-9123e.firebasestorage.app",
            messagingSenderId: "404273025503",
            appId: "1:404273025503:web:e3d39ddce616ddbb09f46a",
            measurementId: "G-BSGJ2BRSBB"
        };
        
        const appId = 'cash-accounting-v1';
        let auth, db, googleProvider;

        try {
            if (window.Firebase) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                googleProvider = new GoogleAuthProvider();
                googleProvider.setCustomParameters({ prompt: 'select_account' });
            }
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [vendorPayments, setVendorPayments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [authProcessing, setAuthProcessing] = useState(true); 
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(null);
            const [error, setError] = useState(null);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', 
                amountExclTax: '', tax: '', amountInclTax: '', 
                retentionRate: 10, retentionExpiry: '',
                invoiceNo: '', invoiceDate: '', hasRetention: false, type: 'owner', vendor: ''
            });

            const showToast = (msg, type = "success") => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 4000);
            };

            // 金額自動計算邏輯
            const handlePriceChange = (field, value) => {
                const numVal = Number(value) || 0;
                let newFormData = { ...formData, [field]: value };

                if (field === 'amountExclTax') {
                    const calcTax = Math.round(numVal * 0.05);
                    newFormData.tax = calcTax.toString();
                    newFormData.amountInclTax = (numVal + calcTax).toString();
                } else if (field === 'tax') {
                    const excl = Number(formData.amountExclTax) || 0;
                    newFormData.amountInclTax = (excl + numVal).toString();
                }

                setFormData(newFormData);
            };

            // 1. 認證處理
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        await setPersistence(auth, browserLocalPersistence);
                        const res = await getRedirectResult(auth);
                        if (res?.user) setUser(res.user);
                        else if (auth.currentUser) setUser(auth.currentUser);
                    } catch (err) {
                        console.error(err);
                    } finally {
                        sessionStorage.removeItem('pending_login');
                        setAuthProcessing(false);
                    }
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, (u) => {
                    if (u) { setUser(u); setAuthProcessing(false); }
                });
                return () => unsub();
            }, []);

            // 2. 資料同步
            useEffect(() => {
                if (!user || !db) return;
                setIsLoading(true);

                const cCol = collection(db, 'artifacts', appId, 'users', user.uid, 'contracts');
                const oCol = collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments');
                const vCol = collection(db, 'artifacts', appId, 'users', user.uid, 'vendorPayments');

                const unsubContracts = onSnapshot(query(cCol), (snap) => {
                    setContracts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsLoading(false);
                }, (err) => {
                    setError("資料庫讀取失敗：請先點擊 Firebase 後台的「建立資料庫」並設定 Rules。");
                    setIsLoading(false);
                });

                const unsubOwnerPay = onSnapshot(query(oCol), (snap) => {
                    setOwnerPayments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubVendorPay = onSnapshot(query(vCol), (snap) => {
                    setVendorPayments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubContracts(); unsubOwnerPay(); unsubVendorPay(); };
            }, [user]);

            const handleGoogleLogin = async () => {
                try {
                    setAuthProcessing(true);
                    sessionStorage.setItem('pending_login', 'true');
                    const isMessenger = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent);
                    if (isMessenger) await signInWithRedirect(auth, googleProvider);
                    else {
                        const res = await signInWithPopup(auth, googleProvider);
                        setUser(res.user);
                        setAuthProcessing(false);
                        sessionStorage.removeItem('pending_login');
                    }
                } catch (err) {
                    setError("登入失敗: " + err.message);
                    setAuthProcessing(false);
                    sessionStorage.removeItem('pending_login');
                }
            };

            // 核心運算邏輯
            const stats = useMemo(() => {
                return contracts.map(c => {
                    const ownerPaid = ownerPayments.filter(p => p.contractId === c.id).reduce((s, p) => s + Number(p.amountInclTax || p.amount), 0);
                    const vendorPaid = vendorPayments.filter(p => p.contractId === c.id).reduce((s, p) => s + Number(p.amountInclTax || p.amount), 0);
                    
                    const totalIncl = Number(c.amountInclTax || c.totalAmount);
                    const ret = (totalIncl * (c.hasRetention ? Number(c.retentionRate) : 0)) / 100;
                    const isExp = c.hasRetention && c.retentionExpiry && new Date(c.retentionExpiry) <= new Date(Date.now() + 30*24*60*60*1000);
                    
                    return { 
                        ...c, 
                        totalIncl, 
                        ownerPaid, 
                        vendorPaid, 
                        retentionAmount: ret, 
                        isExpiring: isExp 
                    };
                });
            }, [contracts, ownerPayments, vendorPayments]);

            const filteredStats = stats.filter(s => (s.year === filterYear) && (filterCompany === 'All' || s.owner === filterCompany));

            // --- 存檔動作 ---
            const handleSaveContract = async () => {
                if (!user || !db) return;
                if (!formData.name || !formData.amountInclTax) {
                    showToast("請填寫合約名稱與金額", "error");
                    return;
                }
                setIsSaving(true);
                try {
                    const payload = {
                        name: formData.name,
                        owner: formData.owner,
                        amountExclTax: Number(formData.amountExclTax) || 0,
                        tax: Number(formData.tax) || 0,
                        amountInclTax: Number(formData.amountInclTax) || 0,
                        hasRetention: formData.hasRetention,
                        retentionRate: formData.hasRetention ? Number(formData.retentionRate) : 0,
                        retentionExpiry: formData.hasRetention ? formData.retentionExpiry : '',
                        year: filterYear,
                        updatedAt: Date.now()
                    };

                    if (showModal.contractId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contracts', showModal.contractId), payload);
                        showToast("合約內容已更新");
                    } else {
                        payload.createdAt = Date.now();
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'contracts'), payload);
                        showToast("新合約已同步至雲端");
                    }
                    
                    setShowModal(null);
                    setFormData({ name: '', owner: '', amountExclTax: '', tax: '', amountInclTax: '', retentionRate: 10, retentionExpiry: '', hasRetention: false, type: 'owner', vendor: '' });
                } catch (err) {
                    showToast("儲存失敗：請確認 Firestore 是否已建立", "error");
                    console.error(err);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleSavePayment = async () => {
                if (!user || !db) return;
                if (!formData.amountInclTax || Number(formData.amountInclTax) <= 0) {
                    showToast("請輸入有效的入帳金額", "error");
                    return;
                }
                setIsSaving(true);
                try {
                    const isOwner = formData.type === 'owner';
                    const colName = isOwner ? 'ownerPayments' : 'vendorPayments';
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, colName), {
                        contractId: showModal.contractId,
                        amountExclTax: Number(formData.amountExclTax) || 0,
                        tax: Number(formData.tax) || 0,
                        amountInclTax: Number(formData.amountInclTax) || 0,
                        invoiceNo: formData.invoiceNo || '',
                        invoiceDate: formData.invoiceDate || '',
                        vendor: isOwner ? undefined : formData.vendor,
                        createdAt: Date.now()
                    });
                    showToast(isOwner ? "業主收款已成功入帳" : "廠商付款已成功紀錄");
                    setShowModal(null);
                    setFormData({ ...formData, amountExclTax: '', tax: '', amountInclTax: '', invoiceNo: '', invoiceDate: '', vendor: '' });
                } catch (err) {
                    showToast("同步失敗：雲端資料庫連線中斷", "error");
                    console.error(err);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleDeleteContract = async (id) => {
                if (!user || !db || !confirm('確定要刪除嗎？雲端資料將永久移除。')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contracts', id));
            };

            const handleOpenEdit = (contract) => {
                setFormData({
                    name: contract.name,
                    owner: contract.owner,
                    amountExclTax: contract.amountExclTax || '',
                    tax: contract.tax || '',
                    amountInclTax: contract.amountInclTax || contract.totalAmount || '',
                    hasRetention: contract.hasRetention,
                    retentionRate: contract.retentionRate || 10,
                    retentionExpiry: contract.retentionExpiry || '',
                    type: 'owner'
                });
                setShowModal({ type: 'contract', contractId: contract.id });
            };

            // --- UI 渲染 ---

            const isPending = sessionStorage.getItem('pending_login') === 'true';
            if (authProcessing || isPending) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="flex flex-col items-center">
                        <div className="w-12 h-12 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-400 font-black text-xs tracking-widest uppercase">Initializing System...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl max-w-sm w-full text-center border-4 border-white animate-in">
                        <div className="flex justify-center mb-8">
                            <div className="p-8 bg-blue-600 text-white rounded-[2.5rem] shadow-2xl rotate-3"><Icon name="shield-check" size={56} /></div>
                        </div>
                        <h1 className="text-4xl font-black text-slate-800 mb-2 tracking-tighter">雲端記帳</h1>
                        <p className="text-slate-400 mb-12 font-bold uppercase tracking-widest text-[10px]">Construction Ledger</p>
                        {error && <div className="bg-rose-50 text-rose-600 text-[10px] p-4 rounded-2xl mb-6 font-black border border-rose-100">{error}</div>}
                        <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-slate-900 py-5 rounded-[1.75rem] font-black text-white hover:bg-slate-800 shadow-xl active:scale-95 transition-all text-lg">
                            Google 帳號登入
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-10 animate-in bg-slate-50 pb-28">
                    {toast && (
                        <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-full shadow-2xl font-black text-white text-sm animate-in flex items-center gap-3 ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                            <Icon name={toast.type === 'success' ? "check-circle" : "alert-circle"} size={20} />
                            {toast.msg}
                        </div>
                    )}

                    <header className="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-slate-200 pb-10">
                        <div className="flex items-center gap-5">
                            {user.photoURL && <img src={user.photoURL} className="w-16 h-16 rounded-[1.5rem] border-4 border-white shadow-xl rotate-2" />}
                            <div>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tighter">工程記帳<span className="text-blue-600">系統</span></h1>
                                <p className="text-slate-400 text-xs font-black uppercase tracking-widest mt-1 flex items-center gap-1"><Icon name="cloud" size={10} className="text-emerald-500" /> {user.displayName}</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => { setFormData({name:'', owner:'', amountExclTax:'', tax:'', amountInclTax:'', retentionRate: 10, retentionExpiry: '', hasRetention: false, type: 'owner'}); setShowModal({ type: 'contract' }); }} className="bg-blue-600 text-white px-8 py-4 rounded-2xl flex items-center gap-2 shadow-2xl shadow-blue-100 font-black transition-all hover:bg-blue-700 active:scale-95"><Icon name="plus" size={24} /> 新增合約</button>
                            <button onClick={() => signOut(auth).then(() => window.location.reload())} className="bg-white text-slate-400 border-2 border-slate-100 px-6 py-4 rounded-2xl font-black active:scale-95 transition-all">登出</button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto mb-10 flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                        <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="p-5 bg-white border-2 border-slate-50 rounded-[1.5rem] text-sm font-black shadow-sm outline-none focus:border-blue-600 transition-all cursor-pointer min-w-[150px]">
                            {[2024, 2025, 2026].map(y => <option key={y} value={y}>{y} 年度數據</option>)}
                        </select>
                        <select value={filterCompany} onChange={e => setFilterCompany(e.target.value)} className="p-5 bg-white border-2 border-slate-50 rounded-[1.5rem] text-sm font-black flex-grow shadow-sm outline-none focus:border-blue-600 transition-all cursor-pointer">
                            <option value="All">顯示所有業主公司資料</option>
                            {[...new Set(contracts.map(c => c.owner))].map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </div>

                    <main className="max-w-7xl mx-auto space-y-12">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 font-black text-slate-800 text-center">
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm flex items-center gap-6 transition-transform hover:scale-[1.02]">
                                <div className="p-6 bg-indigo-600 text-white rounded-3xl shadow-xl shadow-indigo-100"><Icon name="dollar-sign" size={36} /></div>
                                <div className="text-left"><p className="text-[11px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">年度合約總額 (含稅)</p><p className="text-3xl tracking-tighter">${filteredStats.reduce((a, b) => a + b.totalIncl, 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm flex items-center gap-6 transition-transform hover:scale-[1.02]">
                                <div className="p-6 bg-emerald-600 text-white rounded-3xl shadow-xl shadow-emerald-100"><Icon name="check-circle" size={36} /></div>
                                <div className="text-left"><p className="text-[11px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">業主累計付款 (含稅)</p><p className="text-3xl text-emerald-600 tracking-tighter">${filteredStats.reduce((a, b) => a + b.ownerPaid, 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm flex items-center gap-6 transition-transform hover:scale-[1.02]">
                                <div className="p-6 bg-amber-600 text-white rounded-3xl shadow-xl shadow-amber-100"><Icon name="clock" size={36} /></div>
                                <div className="text-left"><p className="text-[11px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">預計可領保留款</p><p className="text-3xl text-amber-500 tracking-tighter">${filteredStats.reduce((a, b) => a + b.retentionAmount, 0).toLocaleString()}</p></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-[3rem] shadow-sm overflow-hidden border-2 border-slate-50">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[1000px]">
                                    <thead className="bg-slate-50/50 text-[10px] font-black uppercase text-slate-400 border-b tracking-[0.25em]">
                                        <tr>
                                            <th className="px-12 py-8">工程案名 / 業主公司</th>
                                            <th className="px-12 py-8">合約總額 (含稅)</th>
                                            <th className="px-12 py-8 text-emerald-600">業主已付</th>
                                            <th className="px-12 py-8 text-blue-600">廠商已付</th>
                                            <th className="px-12 py-8 text-amber-600">保留款額</th>
                                            <th className="px-12 py-8 text-right">管理</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                        {filteredStats.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="px-12 py-10">
                                                    <div className="font-black text-slate-800 text-2xl tracking-tight mb-1">{item.name}</div>
                                                    <div className="text-sm text-slate-400 font-bold flex items-center gap-1.5 uppercase"><Icon name="building" size={14} /> {item.owner}</div>
                                                </td>
                                                <td className="px-12 py-10">
                                                    <div className="text-lg font-black text-slate-600 font-mono">${item.totalIncl.toLocaleString()}</div>
                                                    <div className="text-[10px] text-slate-300 font-bold">未稅: ${Number(item.amountExclTax || 0).toLocaleString()}</div>
                                                </td>
                                                <td className="px-12 py-10 font-black text-emerald-600 text-2xl font-mono">${item.ownerPaid.toLocaleString()}</td>
                                                <td className="px-12 py-10 font-black text-blue-600 text-2xl font-mono">${item.vendorPaid.toLocaleString()}</td>
                                                <td className="px-12 py-10">
                                                    {item.hasRetention ? (
                                                        <>
                                                            <div className={`font-black text-2xl font-mono ${item.isExpiring ? 'text-rose-500 animate-pulse' : 'text-amber-500'}`}>${item.retentionAmount.toLocaleString()}</div>
                                                            <div className="text-[10px] text-slate-400 font-black mt-2">到期日: {item.retentionExpiry || '--'}</div>
                                                        </>
                                                    ) : (
                                                        <span className="text-slate-200 text-sm italic font-bold">無保留款項目</span>
                                                    )}
                                                </td>
                                                <td className="px-12 py-10 text-right flex justify-end gap-3 items-center">
                                                    <button onClick={() => { setFormData({...formData, amountExclTax:'', tax:'', amountInclTax:'', invoiceNo:'', invoiceDate:'', type: 'owner', vendor: ''}); setShowModal({type:'payment', contractId:item.id}); }} className="p-5 bg-emerald-50 text-emerald-600 rounded-[1.25rem] hover:bg-emerald-600 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="plus" size={32} /></button>
                                                    <button onClick={() => handleOpenEdit(item)} className="p-5 bg-blue-50 text-blue-600 rounded-[1.25rem] hover:bg-blue-600 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="pencil" size={32} /></button>
                                                    <button onClick={() => handleDeleteContract(item.id)} className="p-5 text-slate-200 hover:text-rose-500 hover:bg-rose-50 rounded-[1.25rem] transition-all opacity-0 group-hover:opacity-100 active:scale-90"><Icon name="trash-2" size={32} /></button>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredStats.length === 0 && (
                                            <tr><td colSpan="6" className="px-6 py-48 text-center text-slate-200 italic font-black text-3xl tracking-tighter">尚無合約紀錄</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-[3.5rem] shadow-2xl w-full max-w-md border-8 border-white my-auto animate-in overflow-hidden">
                                <div className="p-10 border-b flex justify-between items-center bg-slate-50/50 font-black text-slate-800 tracking-tighter">
                                    <h3 className="text-2xl">{showModal.type === 'contract' ? (showModal.contractId ? '修改合約內容' : '新建雲端工程合約') : '記錄已入帳/支出款項'}</h3>
                                    <button onClick={() => { if(!isSaving) setShowModal(null); }} className="p-3 text-slate-300 hover:text-slate-600"><Icon name="x" size={28} /></button>
                                </div>
                                <div className="p-12 space-y-6">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <div className="space-y-1">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">工程案名</label>
                                                <input type="text" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] text-lg font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">業主公司</label>
                                                <input type="text" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] text-lg font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            </div>

                                            <div className="grid grid-cols-1 gap-4 p-5 bg-slate-100/50 rounded-3xl border-2 border-slate-50">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">合約金額 (未稅)</label>
                                                    <input type="number" className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl text-lg font-black outline-none focus:border-blue-600 font-mono" value={formData.amountExclTax} onChange={e => handlePriceChange('amountExclTax', e.target.value)} placeholder="輸入未稅自動計稅" />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">稅金 (5%)</label>
                                                        <input type="number" className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl text-lg font-black outline-none focus:border-blue-600 font-mono" value={formData.tax} onChange={e => handlePriceChange('tax', e.target.value)} />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">含稅總計</label>
                                                        <input type="number" className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl text-lg font-black outline-none focus:border-blue-600 font-mono text-blue-700" value={formData.amountInclTax} onChange={e => handlePriceChange('amountInclTax', e.target.value)} />
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="flex items-center gap-4 p-5 bg-slate-100/50 rounded-3xl border-2 border-slate-50 transition-all cursor-pointer hover:bg-slate-100" onClick={() => setFormData({...formData, hasRetention: !formData.hasRetention})}>
                                                <div className={`w-8 h-8 rounded-lg border-2 flex items-center justify-center transition-all ${formData.hasRetention ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-200 text-transparent'}`}><Icon name="check" size={16} /></div>
                                                <span className="font-black text-slate-700 text-base tracking-widest">啟用保留款設定</span>
                                            </div>

                                            {formData.hasRetention && (
                                                <div className="grid grid-cols-2 gap-6 animate-in">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">保留 %</label>
                                                        <input type="number" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] font-black outline-none focus:border-blue-600" value={formData.retentionRate} onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">到期日</label>
                                                        <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] font-black outline-none focus:border-blue-600 text-sm" value={formData.retentionExpiry} onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                                    </div>
                                                </div>
                                            )}

                                            <button onClick={handleSaveContract} disabled={isSaving} className="w-full py-6 bg-blue-600 text-white font-black rounded-[2rem] shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-[0.98] mt-4 text-xl tracking-tighter disabled:bg-blue-300">
                                                {isSaving ? "處理中..." : (showModal.contractId ? "更新合約資料" : "建立雲端合約")}
                                            </button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="space-y-3">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 text-center block">款項類別</label>
                                                <div className="flex p-2 bg-slate-100 rounded-[2rem] border border-slate-200">
                                                    <button onClick={() => setFormData({...formData, type: 'owner'})} className={`flex-1 py-4 text-sm font-black rounded-[1.5rem] transition-all ${formData.type === 'owner' ? 'bg-white shadow-md text-emerald-600 scale-105' : 'text-slate-400'}`}>業主收款 (+)</button>
                                                    <button onClick={() => setFormData({...formData, type: 'vendor'})} className={`flex-1 py-4 text-sm font-black rounded-[1.5rem] transition-all ${formData.type === 'vendor' ? 'bg-white shadow-md text-blue-600 scale-105' : 'text-slate-400'}`}>廠商付款 (-)</button>
                                                </div>
                                            </div>

                                            <div className="space-y-4 p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-100">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">交易金額 (未稅)</label>
                                                    <input type="number" className="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl text-2xl font-black outline-none font-mono text-center" value={formData.amountExclTax} onChange={e => handlePriceChange('amountExclTax', e.target.value)} placeholder="0" />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">稅金</label>
                                                        <input type="number" className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-black font-mono text-center" value={formData.tax} onChange={e => handlePriceChange('tax', e.target.value)} />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">含稅總額</label>
                                                        <input type="number" className={`w-full p-4 border-2 rounded-2xl font-black font-mono text-center ${formData.type === 'owner' ? 'bg-emerald-50 border-emerald-100 text-emerald-600' : 'bg-blue-50 border-blue-100 text-blue-600'}`} value={formData.amountInclTax} onChange={e => handlePriceChange('amountInclTax', e.target.value)} />
                                                    </div>
                                                </div>
                                            </div>

                                            {formData.type === 'vendor' && (
                                                <div className="space-y-2 animate-in">
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">廠商名稱</label>
                                                    <input type="text" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black outline-none focus:border-blue-600" value={formData.vendor} onChange={e => setFormData({...formData, vendor: e.target.value})} placeholder="輸入下包廠商" />
                                                </div>
                                            )}

                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-slate-400 ml-1">發票號碼</label>
                                                    <input type="text" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black uppercase outline-none focus:border-slate-300" value={formData.invoiceNo} onChange={e => setFormData({...formData, invoiceNo: e.target.value})} placeholder="AB-..." />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-slate-400 ml-1">開立日期</label>
                                                    <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black outline-none focus:border-slate-300 text-xs" value={formData.invoiceDate} onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                                </div>
                                            </div>
                                            
                                            <button 
                                                onClick={handleSavePayment} 
                                                disabled={isSaving} 
                                                className={`w-full py-6 text-white font-black rounded-[2.5rem] shadow-2xl transition-all active:scale-[0.98] mt-4 text-xl ${formData.type === 'owner' ? 'bg-emerald-600 shadow-emerald-100' : 'bg-blue-600 shadow-blue-100'} disabled:bg-slate-300 flex justify-center items-center gap-3`}
                                            >
                                                {isSaving ? <><Icon name="loader-2" className="animate-spin" /> 正在雲端存檔...</> : "確認儲存並同步"}
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
