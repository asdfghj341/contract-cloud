<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } = window.Firebase || {};

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB--thdJ-fp8OfQriXU6r7qnutWEPLN86Y",
            authDomain: "cashproject-9123e.firebaseapp.com",
            projectId: "cashproject-9123e",
            storageBucket: "cashproject-9123e.firebasestorage.app",
            messagingSenderId: "404273025503",
            appId: "1:404273025503:web:e3d39ddce616ddbb09f46a",
            measurementId: "G-BSGJ2BRSBB"
        };
        
        const appId = 'cash-accounting-v1';
        let auth, db;

        // 安全地初始化 Firebase
        try {
            if (window.Firebase) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [vendorPayments, setVendorPayments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '',
                type: 'owner', amount: '', invoiceNo: '', invoiceDate: '', vendor: ''
            });

            useEffect(() => {
                if (!auth) {
                    setError("無法連接到 Firebase 服務，請檢查網路或金鑰設定。");
                    setIsLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("認證錯誤:", err);
                        if (err.code === 'auth/configuration-not-found') {
                            setError("匿名登入功能尚未在 Firebase Console 中開啟。");
                        } else {
                            setError(`登入失敗: ${err.message}`);
                        }
                        setIsLoading(false);
                    }
                };

                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setError(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const contractsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'contracts');
                const ownerPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments');
                const vendorPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'vendorPayments');

                const unsubContracts = onSnapshot(query(contractsCol), (snapshot) => {
                    setContracts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, (err) => {
                    console.error("讀取數據失敗:", err);
                    setError(`資料庫讀取失敗: ${err.message}`);
                    setIsLoading(false);
                });

                const unsubOwnerPay = onSnapshot(query(ownerPaymentsCol), (snapshot) => {
                    setOwnerPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubVendorPay = onSnapshot(query(vendorPaymentsCol), (snapshot) => {
                    setVendorPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => {
                    unsubContracts();
                    unsubOwnerPay();
                    unsubVendorPay();
                };
            }, [user]);

            const stats = useMemo(() => {
                return contracts.map(contract => {
                    const oPay = ownerPayments
                        .filter(p => p.contractId === contract.id && p.status === '已收')
                        .reduce((sum, p) => sum + p.amount, 0);
                    const vPay = vendorPayments
                        .filter(v => v.contractId === contract.id && v.status === '已付')
                        .reduce((sum, v) => sum + v.amount, 0);
                    const retentionAmount = (Number(contract.totalAmount) * Number(contract.retentionRate)) / 100;
                    const expiryDate = new Date(contract.retentionExpiry);
                    const isRetentionExpiring = contract.retentionExpiry ? expiryDate <= new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) : false;

                    return {
                        ...contract,
                        ownerPaid: oPay, vendorPaid: vPay, retentionAmount,
                        alerts: {
                            vendorLagging: oPay > vPay && vPay > 0,
                            ownerLagging: vPay > oPay,
                            retentionExpiring: isRetentionExpiring
                        }
                    };
                });
            }, [contracts, ownerPayments, vendorPayments]);

            const filteredStats = useMemo(() => {
                return stats.filter(s => {
                    const yearMatch = s.year === filterYear;
                    const companyMatch = filterCompany === 'All' || s.owner === filterCompany;
                    return yearMatch && companyMatch;
                });
            }, [stats, filterYear, filterCompany]);

            const handleSaveContract = async () => {
                if (!user || !db) return;
                const newContract = {
                    name: formData.name || '未命名合約',
                    owner: formData.owner || '未知業主',
                    totalAmount: Number(formData.totalAmount) || 0,
                    retentionRate: Number(formData.retentionRate) || 10,
                    retentionExpiry: formData.retentionExpiry || '',
                    year: filterYear,
                    startDate: new Date().toISOString().split('T')[0]
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'contracts'), newContract);
                setShowModal(null);
            };

            const handleSavePayment = async () => {
                if (!user || !db) return;
                const isOwner = formData.type === 'owner';
                const newPayment = {
                    contractId: showModal.contractId,
                    amount: Number(formData.amount) || 0,
                    invoiceNo: formData.invoiceNo || '',
                    invoiceDate: formData.invoiceDate || '',
                    status: isOwner ? '已收' : '已付',
                };
                const colName = isOwner ? 'ownerPayments' : 'vendorPayments';
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, colName), newPayment);
                setShowModal(null);
            };

            if (error) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-rose-100 text-center max-w-sm">
                        <div className="text-rose-500 mb-4 flex justify-center"><Icon name="alert-circle" size={48} /></div>
                        <h2 className="text-lg font-bold mb-2">發生錯誤</h2>
                        <p className="text-slate-500 text-sm mb-6">{error}</p>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">重新整理</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center animate-pulse">
                        <div className="flex justify-center mb-4 text-blue-600"><Icon name="cloud" size={48} /></div>
                        <p className="text-slate-400 font-medium">同步雲端資料...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 animate-in">
                    <div className="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-extrabold text-slate-800">工程合約記帳系統</h1>
                            <p className="text-slate-500">雲端即時同步管理</p>
                        </div>
                        <button onClick={() => setShowModal({ type: 'contract' })} className="bg-blue-600 text-white px-6 py-3 rounded-xl flex items-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="plus" size={20} /> 新增合約</button>
                    </div>

                    <div className="max-w-7xl mx-auto mb-6 flex flex-wrap gap-4">
                        <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="p-2 bg-white border rounded-lg text-sm outline-none">
                            <option value="2024">2024 年度</option>
                            <option value="2025">2025 年度</option>
                            <option value="2026">2026 年度</option>
                        </select>
                        <select value={filterCompany} onChange={e => setFilterCompany(e.target.value)} className="p-2 bg-white border rounded-lg text-sm outline-none">
                            <option value="All">所有業主</option>
                            {[...new Set(contracts.map(c => c.owner))].map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </div>

                    <div className="max-w-7xl mx-auto space-y-8">
                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-6 rounded-2xl border flex items-center gap-4">
                                    <div className="p-3 bg-indigo-500 text-white rounded-xl"><Icon name="dollar-sign" size={24} /></div>
                                    <div><p className="text-sm text-gray-500">合約總額</p><p className="text-2xl font-bold">${filteredStats.reduce((a, b) => a + b.totalAmount, 0).toLocaleString()}</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border flex items-center gap-4">
                                    <div className="p-3 bg-emerald-500 text-white rounded-xl"><Icon name="check-circle" size={24} /></div>
                                    <div><p className="text-sm text-gray-500">業主已付</p><p className="text-2xl font-bold">${filteredStats.reduce((a, b) => a + b.ownerPaid, 0).toLocaleString()}</p></div>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border flex items-center gap-4">
                                    <div className="p-3 bg-amber-500 text-white rounded-xl"><Icon name="clock" size={24} /></div>
                                    <div><p className="text-sm text-gray-500">待結保留款</p><p className="text-2xl font-bold">${filteredStats.reduce((a, b) => a + b.retentionAmount, 0).toLocaleString()}</p></div>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-3xl border overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-xs font-bold uppercase text-slate-400">
                                    <tr>
                                        <th className="px-6 py-4">合約 / 業主</th>
                                        <th className="px-6 py-4">總額</th>
                                        <th className="px-6 py-4">業主已付</th>
                                        <th className="px-6 py-4 text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredStats.map(item => (
                                        <tr key={item.id} className="hover:bg-slate-50/50">
                                            <td className="px-6 py-5 font-bold text-slate-700">{item.name}<div className="text-xs font-normal text-slate-400">{item.owner}</div></td>
                                            <td className="px-6 py-5">${Number(item.totalAmount).toLocaleString()}</td>
                                            <td className="px-6 py-5 font-bold text-emerald-600">${item.ownerPaid.toLocaleString()}</td>
                                            <td className="px-6 py-5 text-right flex justify-end gap-2">
                                                <button onClick={() => { setFormData({...formData, type: 'owner'}); setShowModal({type: 'payment', contractId: item.id}); }} className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg"><Icon name="plus" size={18} /></button>
                                                <button onClick={() => handleDeleteContract(item.id)} className="p-2 text-rose-500 hover:bg-rose-50 rounded-lg"><Icon name="trash-2" size={18} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md animate-in">
                                <div className="p-6 border-b flex justify-between items-center">
                                    <h3 className="font-bold text-lg">{showModal.type === 'contract' ? '新增合約' : '款項紀錄'}</h3>
                                    <button onClick={() => setShowModal(null)} className="text-gray-400">✕</button>
                                </div>
                                <div className="p-6 space-y-4">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <input type="text" placeholder="合約名稱" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, name: e.target.value})} />
                                            <input type="text" placeholder="業主名稱" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            <input type="number" placeholder="金額" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" placeholder="保留款%" defaultValue="10" className="p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                <input type="date" className="p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                            </div>
                                            <button onClick={handleSaveContract} className="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg">建立合約</button>
                                        </>
                                    ) : (
                                        <>
                                            <input type="number" placeholder="金額" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            <input type="text" placeholder="發票號碼" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, invoiceNo: e.target.value})} />
                                            <input type="date" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                            <button onClick={handleSavePayment} className="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg">儲存</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
