<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } = window.Firebase;

        // --- Firebase 初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB--thdJ-fp8OfQriXU6r7qnutWEPLN86Y",
            authDomain: "cashproject-9123e.firebaseapp.com",
            projectId: "cashproject-9123e",
            storageBucket: "cashproject-9123e.firebasestorage.app",
            messagingSenderId: "404273025503",
            appId: "1:404273025503:web:e3d39ddce616ddbb09f46a",
            measurementId: "G-BSGJ2BRSBB"
        };
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }
        
        const appId = 'cash-accounting-v1';

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [vendorPayments, setVendorPayments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [authError, setAuthError] = useState(null);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '',
                type: 'owner', amount: '', invoiceNo: '', invoiceDate: '', vendor: ''
            });

            // 認證與初始化
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // 嘗試匿名登入
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Auth Error:", error);
                        // 擷取特定的配置錯誤
                        if (error.code === 'auth/configuration-not-found') {
                            setAuthError("Firebase 匿名登入尚未啟用。請前往 Firebase Console -> Authentication -> Sign-in method 啟動「匿名」登入。");
                        } else {
                            setAuthError(`連線錯誤: ${error.message}`);
                        }
                        setIsLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setAuthError(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 監聽數據
            useEffect(() => {
                if (!user) return;

                const contractsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'contracts');
                const ownerPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments');
                const vendorPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'vendorPayments');

                const unsubContracts = onSnapshot(query(contractsCol), (snapshot) => {
                    setContracts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setIsLoading(false);
                });

                const unsubOwnerPay = onSnapshot(query(ownerPaymentsCol), (snapshot) => {
                    setOwnerPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => console.error(err));

                const unsubVendorPay = onSnapshot(query(vendorPaymentsCol), (snapshot) => {
                    setVendorPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => console.error(err));

                return () => {
                    unsubContracts();
                    unsubOwnerPay();
                    unsubVendorPay();
                };
            }, [user]);

            const stats = useMemo(() => {
                return contracts.map(contract => {
                    const oPay = ownerPayments
                        .filter(p => p.contractId === contract.id && p.status === '已收')
                        .reduce((sum, p) => sum + p.amount, 0);
                    const vPay = vendorPayments
                        .filter(v => v.contractId === contract.id && v.status === '已付')
                        .reduce((sum, v) => sum + v.amount, 0);
                    const retentionAmount = (contract.totalAmount * contract.retentionRate) / 100;
                    const today = new Date();
                    const expiryDate = new Date(contract.retentionExpiry);
                    const isRetentionExpiring = contract.retentionExpiry ? expiryDate <= new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000) : false;

                    return {
                        ...contract,
                        ownerPaid: oPay, vendorPaid: vPay, retentionAmount,
                        alerts: {
                            vendorLagging: oPay > vPay && vPay > 0,
                            ownerLagging: vPay > oPay,
                            retentionExpiring: isRetentionExpiring
                        }
                    };
                });
            }, [contracts, ownerPayments, vendorPayments]);

            const companies = useMemo(() => {
                const list = new Set();
                contracts.forEach(c => list.add(c.owner));
                return ['All', ...Array.from(list)];
            }, [contracts]);

            const filteredStats = useMemo(() => {
                return stats.filter(s => {
                    const yearMatch = s.year === filterYear;
                    const companyMatch = filterCompany === 'All' || s.owner === filterCompany;
                    return yearMatch && companyMatch;
                });
            }, [stats, filterYear, filterCompany]);

            const handleSaveContract = async () => {
                if (!user) return;
                const newContract = {
                    name: formData.name || '未命名合約',
                    owner: formData.owner || '未知業主',
                    totalAmount: Number(formData.totalAmount) || 0,
                    retentionRate: Number(formData.retentionRate) || 10,
                    retentionExpiry: formData.retentionExpiry || '',
                    year: filterYear,
                    startDate: new Date().toISOString().split('T')[0]
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'contracts'), newContract);
                setShowModal(null);
                setFormData({ ...formData, name: '', owner: '', totalAmount: '', retentionExpiry: '' });
            };

            const handleSavePayment = async () => {
                if (!user) return;
                const isOwner = formData.type === 'owner';
                const newPayment = {
                    contractId: showModal.contractId,
                    amount: Number(formData.amount) || 0,
                    date: formData.invoiceDate || new Date().toISOString().split('T')[0],
                    invoiceNo: formData.invoiceNo || '',
                    invoiceDate: formData.invoiceDate || '',
                    status: isOwner ? '已收' : '已付',
                    vendor: isOwner ? undefined : (formData.vendor || '未知廠商')
                };
                const colName = isOwner ? 'ownerPayments' : 'vendorPayments';
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, colName), newPayment);
                setShowModal(null);
                setFormData({ ...formData, amount: '', invoiceNo: '', invoiceDate: '', vendor: '' });
            };

            const handleDeleteContract = async (id) => {
                if (!user || !confirm('確定要刪除此合約嗎？雲端資料刪除後無法復原。')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contracts', id));
            };

            const SummaryCard = ({ title, value, iconName, color }) => (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div className={`p-3 rounded-xl ${color} text-white flex items-center justify-center`}>
                        <Icon name={iconName} size={24} />
                    </div>
                    <div>
                        <p className="text-sm text-gray-500 font-medium">{title}</p>
                        <p className="text-2xl font-bold text-gray-800">${value.toLocaleString()}</p>
                    </div>
                </div>
            );

            // 錯誤處理介面
            if (authError) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-rose-100 text-center">
                        <div className="text-rose-500 mb-4 flex justify-center"><Icon name="alert-circle" size={48} /></div>
                        <h2 className="text-xl font-bold text-slate-800 mb-2">雲端連線失敗</h2>
                        <p className="text-slate-500 text-sm mb-6 leading-relaxed">{authError}</p>
                        <button onClick={() => window.location.reload()} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition-colors">重新整理</button>
                    </div>
                </div>
            );

            if (isLoading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="sync-indicator mb-4 text-blue-600 flex justify-center"><Icon name="cloud" size={48} /></div>
                        <p className="text-slate-500 font-medium tracking-widest">雲端資料讀取中...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 animate-in">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <h1 className="text-3xl font-extrabold tracking-tight text-slate-800">工程合約記帳系統</h1>
                                <div className="flex items-center gap-1 px-2 py-0.5 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-full border border-emerald-100">
                                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full sync-indicator"></div> 雲端連線中
                                </div>
                            </div>
                            <p className="text-slate-500">追蹤合約進度、發票管理與保留款提醒</p>
                        </div>
                        <button onClick={() => setShowModal({ type: 'contract' })} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl flex items-center gap-2 shadow-lg active:scale-95"><Icon name="plus" size={20} /> 新增合約</button>
                    </div>

                    <div className="max-w-7xl mx-auto mb-6">
                        <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex p-1 bg-gray-50 rounded-xl">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded-lg text-sm font-medium ${activeTab === 'dashboard' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>儀表板</button>
                                <button onClick={() => setActiveTab('contracts')} className={`px-4 py-2 rounded-lg text-sm font-medium ${activeTab === 'contracts' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>合約清單</button>
                            </div>
                            <div className="flex gap-4">
                                <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-gray-50 border-none text-sm rounded-lg p-2 outline-none cursor-pointer">
                                    <option value="2024">2024 年度</option>
                                    <option value="2025">2025 年度</option>
                                    <option value="2026">2026 年度</option>
                                </select>
                                <select value={filterCompany} onChange={(e) => setFilterCompany(e.target.value)} className="bg-gray-50 border-none text-sm rounded-lg p-2 outline-none cursor-pointer">
                                    {companies.map(c => <option key={c} value={c}>{c === 'All' ? '所有業主' : c}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto space-y-8">
                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <SummaryCard title="年度合約總額" value={filteredStats.reduce((sum, s) => sum + s.totalAmount, 0)} iconName="dollar-sign" color="bg-indigo-500" />
                                <SummaryCard title="已收業主款項" value={filteredStats.reduce((sum, s) => sum + s.ownerPaid, 0)} iconName="check-circle" color="bg-emerald-500" />
                                <SummaryCard title="待結保留款" value={filteredStats.reduce((sum, s) => sum + s.retentionAmount, 0)} iconName="clock" color="bg-amber-500" />
                            </div>
                        )}

                        <div className="space-y-4">
                            <h3 className="text-lg font-bold flex items-center gap-2 text-slate-700"><Icon name="alert-triangle" size={20} className="text-amber-500" /> 系統提醒</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filteredStats.filter(s => s.alerts.vendorLagging || s.alerts.retentionExpiring).length > 0 ? (
                                    filteredStats.map(s => (
                                        <React.Fragment key={s.id}>
                                            {s.alerts.vendorLagging && (
                                                <div className="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl flex items-start gap-3">
                                                    <Icon name="arrow-right-left" className="text-amber-600 mt-1" />
                                                    <div><p className="font-bold text-amber-900">{s.name}</p><p className="text-sm text-amber-700">業主已付款，但廠商撥款進度較慢。</p></div>
                                                </div>
                                            )}
                                            {s.alerts.retentionExpiring && (
                                                <div className="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-xl flex items-start gap-3">
                                                    <Icon name="clock" className="text-blue-600 mt-1" />
                                                    <div><p className="font-bold text-blue-900">{s.name}</p><p className="text-sm text-blue-700">保留款即將到期：{s.retentionExpiry}</p></div>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    ))
                                ) : (
                                    <div className="col-span-2 py-6 bg-white border border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-400 text-sm italic">目前無異常提醒。</div>
                                )}
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-gray-50/50 text-gray-500 text-xs font-bold uppercase">
                                        <tr>
                                            <th className="px-6 py-4">合約名稱 / 業主</th>
                                            <th className="px-6 py-4">總額</th>
                                            <th className="px-6 py-4 text-emerald-600">業主已付</th>
                                            <th className="px-6 py-4 text-blue-600">廠商已付</th>
                                            <th className="px-6 py-4">保留款 (到期)</th>
                                            <th className="px-6 py-4 text-right">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {filteredStats.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group text-sm">
                                                <td className="px-6 py-5">
                                                    <div className="font-bold text-slate-800">{item.name}</div>
                                                    <div className="text-xs text-slate-400 mt-0.5">{item.owner}</div>
                                                </td>
                                                <td className="px-6 py-5 font-medium text-slate-600">${item.totalAmount.toLocaleString()}</td>
                                                <td className="px-6 py-5 font-bold text-emerald-600">${item.ownerPaid.toLocaleString()}</td>
                                                <td className="px-6 py-5 font-bold text-blue-600">${item.vendorPaid.toLocaleString()}</td>
                                                <td className="px-6 py-5">
                                                    <div className={`font-bold ${item.alerts.retentionExpiring ? "text-rose-500" : "text-amber-600"}`}>${item.retentionAmount.toLocaleString()}</div>
                                                    <div className="text-[10px] text-gray-400">{item.retentionExpiry || '未設定'}</div>
                                                </td>
                                                <td className="px-6 py-5 text-right flex justify-end gap-2">
                                                    <button onClick={() => { setFormData({ ...formData, type: 'owner' }); setShowModal({ type: 'payment', contractId: item.id }); }} className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg"><Icon name="plus" size={18} /></button>
                                                    <button onClick={() => handleDeleteContract(item.id)} className="p-2 text-rose-600 hover:bg-rose-50 rounded-lg opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={18} /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="font-bold text-lg text-slate-800">{showModal.type === 'contract' ? '建立合約' : '記帳'}</h3>
                                    <button onClick={() => setShowModal(null)} className="text-gray-400">✕</button>
                                </div>
                                <div className="p-6 space-y-4">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <input type="text" placeholder="合約名稱" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, name: e.target.value})} />
                                            <input type="text" placeholder="業主名稱" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            <input type="number" placeholder="金額" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" placeholder="保留款%" className="p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                <input type="date" className="p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                            </div>
                                            <button onClick={handleSaveContract} className="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl">建立</button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="flex p-1 bg-slate-100 rounded-xl">
                                                <button onClick={() => setFormData({...formData, type: 'owner'})} className={`flex-1 py-2 text-xs font-bold rounded-lg ${formData.type === 'owner' ? 'bg-white text-emerald-600' : 'text-slate-400'}`}>業主收款</button>
                                                <button onClick={() => setFormData({...formData, type: 'vendor'})} className={`flex-1 py-2 text-xs font-bold rounded-lg ${formData.type === 'vendor' ? 'bg-white text-blue-600' : 'text-slate-400'}`}>廠商付款</button>
                                            </div>
                                            <input type="number" placeholder="金額" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            <input type="text" placeholder="發票號碼" className="w-full p-3 bg-slate-50 border rounded-xl uppercase" onChange={e => setFormData({...formData, invoiceNo: e.target.value})} />
                                            <input type="date" className="w-full p-3 bg-slate-50 border rounded-xl" onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                            <button onClick={handleSavePayment} className="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl">儲存</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
