<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } = window.Firebase || {};

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB--thdJ-fp8OfQriXU6r7qnutWEPLN86Y",
            authDomain: "cashproject-9123e.firebaseapp.com",
            projectId: "cashproject-9123e",
            storageBucket: "cashproject-9123e.firebasestorage.app",
            messagingSenderId: "404273025503",
            appId: "1:404273025503:web:e3d39ddce616ddbb09f46a",
            measurementId: "G-BSGJ2BRSBB"
        };
        
        const appId = 'cash-accounting-v1';
        let auth, db, googleProvider;

        try {
            if (window.Firebase) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                googleProvider = new GoogleAuthProvider();
            }
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [vendorPayments, setVendorPayments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isAuthenticating, setIsAuthenticating] = useState(true);
            const [error, setError] = useState(null);
            const [copySuccess, setCopySuccess] = useState(false);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '',
                type: 'owner', amount: '', invoiceNo: '', invoiceDate: '', vendor: ''
            });

            useEffect(() => {
                if (!auth) return;

                getRedirectResult(auth)
                    .then(() => {
                        setIsAuthenticating(false);
                    })
                    .catch((err) => {
                        console.error("Redirect Error:", err);
                        if (err.code === 'auth/unauthorized-domain') {
                            setError(`網域未授權：請將「${window.location.hostname}」加入 Firebase Console 的授權名單。`);
                        } else {
                            setError(`認證失敗: ${err.message}`);
                        }
                        setIsAuthenticating(false);
                    });

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setError(null);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;

                const contractsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'contracts');
                const ownerPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments');
                const vendorPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'vendorPayments');

                const unsubContracts = onSnapshot(query(contractsCol), (snapshot) => {
                    setContracts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => {
                    console.error("讀取數據失敗:", err);
                    setError(`資料庫讀取失敗: ${err.message}`);
                });

                const unsubOwnerPay = onSnapshot(query(ownerPaymentsCol), (snapshot) => {
                    setOwnerPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubVendorPay = onSnapshot(query(vendorPaymentsCol), (snapshot) => {
                    setVendorPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => {
                    unsubContracts();
                    unsubOwnerPay();
                    unsubVendorPay();
                };
            }, [user]);

            const handleGoogleLogin = async () => {
                try {
                    setError(null);
                    setIsAuthenticating(true);
                    await signInWithRedirect(auth, googleProvider);
                } catch (err) {
                    console.error("登入請求失敗:", err);
                    setError(`登入請求失敗: ${err.message}`);
                    setIsAuthenticating(false);
                }
            };

            const handleLogout = async () => {
                try { await signOut(auth); } catch (err) { console.error(err); }
            };

            const handleCopyUrl = () => {
                const el = document.createElement('textarea');
                el.value = window.location.href;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            const stats = useMemo(() => {
                return contracts.map(contract => {
                    const oPay = ownerPayments
                        .filter(p => p.contractId === contract.id)
                        .reduce((sum, p) => sum + p.amount, 0);
                    const retentionAmount = (Number(contract.totalAmount) * Number(contract.retentionRate)) / 100;
                    const expiryDate = new Date(contract.retentionExpiry);
                    const isRetentionExpiring = contract.retentionExpiry ? expiryDate <= new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) : false;

                    return {
                        ...contract,
                        ownerPaid: oPay,
                        retentionAmount,
                        alerts: {
                            retentionExpiring: isRetentionExpiring
                        }
                    };
                });
            }, [contracts, ownerPayments]);

            const filteredStats = useMemo(() => {
                return stats.filter(s => {
                    const yearMatch = s.year === filterYear;
                    const companyMatch = filterCompany === 'All' || s.owner === filterCompany;
                    return yearMatch && companyMatch;
                });
            }, [stats, filterYear, filterCompany]);

            const handleSaveContract = async () => {
                if (!user || !db) return;
                const newContract = {
                    name: formData.name || '未命名合約',
                    owner: formData.owner || '未知業主',
                    totalAmount: Number(formData.totalAmount) || 0,
                    retentionRate: Number(formData.retentionRate) || 10,
                    retentionExpiry: formData.retentionExpiry || '',
                    year: filterYear,
                    startDate: new Date().toISOString().split('T')[0]
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'contracts'), newContract);
                setShowModal(null);
            };

            const handleSavePayment = async () => {
                if (!user || !db) return;
                const newPayment = {
                    contractId: showModal.contractId,
                    amount: Number(formData.amount) || 0,
                    invoiceNo: formData.invoiceNo || '',
                    invoiceDate: formData.invoiceDate || '',
                    status: '已收',
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments'), newPayment);
                setShowModal(null);
            };

            const handleDeleteContract = async (id) => {
                if (!user || !db || !confirm('確定要刪除此合約嗎？')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contracts', id));
            };

            // 登入介面
            if (!user && !isLoading && !isAuthenticating) {
                const isMessenger = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent);

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6 animate-in">
                        <div className="bg-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-slate-200">
                            <div className="flex justify-center mb-6 text-blue-600"><Icon name="building-2" size={64} /></div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">工程合約記帳系統</h1>
                            <p className="text-slate-500 mb-8 font-medium">請登入以同步雲端資料</p>
                            
                            {isMessenger && (
                                <div className="bg-blue-50 text-blue-600 text-[11px] p-4 rounded-xl mb-6 text-left border border-blue-100 leading-relaxed">
                                    <div className="flex gap-2 mb-1 font-bold">
                                        <Icon name="info" size={14} className="shrink-0" />
                                        <span>偵測到您正在使用 LINE/FB 瀏覽器</span>
                                    </div>
                                    <p>Google 政策禁止在 App 內登入。請點擊右上角「...」並選擇「用外部瀏覽器開啟」，或點擊下方按鈕複製網址後開啟 Chrome/Safari。</p>
                                </div>
                            )}

                            {error && (
                                <div className="bg-rose-50 text-rose-600 text-xs p-4 rounded-xl mb-6 text-left flex gap-2 border border-rose-100 leading-relaxed font-medium">
                                    <Icon name="alert-circle" size={16} className="shrink-0 mt-0.5" />
                                    <span>{error}</span>
                                </div>
                            )}

                            <button 
                                onClick={handleGoogleLogin}
                                className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 py-3 rounded-xl font-bold text-slate-700 hover:bg-slate-50 shadow-sm active:scale-95 transition-all mb-4"
                            >
                                <svg className="w-5 h-5" viewBox="0 0 24 24">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                使用 Google 帳號登入
                            </button>

                            <button 
                                onClick={handleCopyUrl}
                                className={`w-full flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-xs transition-all ${copySuccess ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                            >
                                <Icon name={copySuccess ? "check" : "copy"} size={14} />
                                {copySuccess ? "網址已複製！" : "複製網址 (手動貼至 Chrome/Safari)"}
                            </button>

                            <p className="text-[10px] text-slate-400 mt-6 font-medium">您的資料將永久安全儲存於雲端</p>
                        </div>
                    </div>
                );
            }

            if (isLoading || isAuthenticating) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 font-bold text-slate-400">
                    <div className="text-center animate-in">
                        <div className="flex justify-center mb-4 text-blue-600 animate-spin"><Icon name="loader-2" size={48} /></div>
                        <p className="tracking-widest">{isAuthenticating ? "正在連線 Google 認證..." : "雲端資料讀取中..."}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 animate-in">
                    <div className="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-200 pb-8">
                        <div className="flex items-center gap-4">
                            {user.photoURL && <img src={user.photoURL} alt="Avatar" className="w-14 h-14 rounded-full border-2 border-white shadow-md" />}
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tighter">工程記帳系統</h1>
                                <p className="text-slate-500 text-xs font-bold flex items-center gap-1">
                                    <Icon name="user" size={10} /> Hi, {user.displayName}
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowModal({ type: 'contract' })} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 shadow-lg active:scale-95 text-sm font-bold transition-all"><Icon name="plus" size={18} /> 新增合約</button>
                            <button onClick={handleLogout} className="bg-white text-slate-400 border px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-50 transition-all">登出系統</button>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto mb-6 flex gap-4">
                        <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="p-2.5 bg-white border rounded-xl text-sm outline-none shadow-sm font-bold cursor-pointer">
                            <option value="2024">2024 年度</option>
                            <option value="2025">2025 年度</option>
                            <option value="2026">2026 年度</option>
                        </select>
                        <select value={filterCompany} onChange={e => setFilterCompany(e.target.value)} className="p-2.5 bg-white border rounded-xl text-sm outline-none shadow-sm font-bold cursor-pointer">
                            <option value="All">所有業主公司</option>
                            {[...new Set(contracts.map(c => c.owner))].map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </div>

                    <div className="max-w-7xl mx-auto space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 font-black">
                            <div className="bg-white p-7 rounded-3xl border shadow-sm flex items-center gap-5 transition-transform hover:scale-[1.02]">
                                <div className="p-4 bg-indigo-500 text-white rounded-2xl shadow-lg shadow-indigo-100"><Icon name="dollar-sign" size={28} /></div>
                                <div><p className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">合約總額</p><p className="text-3xl tracking-tighter text-slate-800">${filteredStats.reduce((a, b) => a + Number(b.totalAmount), 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-7 rounded-3xl border shadow-sm flex items-center gap-5 transition-transform hover:scale-[1.02]">
                                <div className="p-4 bg-emerald-500 text-white rounded-2xl shadow-lg shadow-emerald-100"><Icon name="check-circle" size={28} /></div>
                                <div><p className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">業主已付</p><p className="text-3xl tracking-tighter text-emerald-600">${filteredStats.reduce((a, b) => a + b.ownerPaid, 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-7 rounded-3xl border shadow-sm flex items-center gap-5 transition-transform hover:scale-[1.02]">
                                <div className="p-4 bg-amber-500 text-white rounded-2xl shadow-lg shadow-amber-100"><Icon name="clock" size={28} /></div>
                                <div><p className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">待結保留款</p><p className="text-3xl tracking-tighter text-amber-500">${filteredStats.reduce((a, b) => a + b.retentionAmount, 0).toLocaleString()}</p></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2rem] border shadow-sm overflow-hidden border-slate-200">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b tracking-widest">
                                    <tr>
                                        <th className="px-8 py-5">合約名稱 / 業主公司</th>
                                        <th className="px-8 py-5">合約總額</th>
                                        <th className="px-8 py-5 text-emerald-600">業主已收款</th>
                                        <th className="px-8 py-5 text-amber-600">待領保留款</th>
                                        <th className="px-8 py-5 text-right">管理操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredStats.map(item => (
                                        <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                            <td className="px-8 py-6">
                                                <div className="font-bold text-slate-700 text-lg leading-tight">{item.name}</div>
                                                <div className="text-[11px] text-slate-400 font-bold mt-1.5 flex items-center gap-1 uppercase">
                                                    <Icon name="building" size={12} /> {item.owner}
                                                </div>
                                            </td>
                                            <td className="px-8 py-6 text-sm font-bold text-slate-500 font-mono">${Number(item.totalAmount).toLocaleString()}</td>
                                            <td className="px-8 py-6 font-black text-emerald-600 text-lg font-mono">${item.ownerPaid.toLocaleString()}</td>
                                            <td className="px-8 py-6">
                                                <div className={`font-black text-lg font-mono ${item.alerts.retentionExpiring ? "text-rose-500 animate-pulse" : "text-amber-500"}`}>
                                                    ${item.retentionAmount.toLocaleString()}
                                                </div>
                                                <div className="text-[10px] text-slate-300 font-bold mt-1 flex items-center gap-1 uppercase">
                                                    <Icon name="calendar" size={10} /> 到期: {item.retentionExpiry || '--'}
                                                </div>
                                            </td>
                                            <td className="px-8 py-6 text-right flex justify-end gap-2 items-center">
                                                <button onClick={() => { setFormData({...formData, type: 'owner'}); setShowModal({type: 'payment', contractId: item.id}); }} className="p-3 bg-blue-50 text-blue-600 rounded-2xl hover:bg-blue-600 hover:text-white transition-all shadow-sm"><Icon name="plus" size={20} /></button>
                                                <button onClick={() => handleDeleteContract(item.id)} className="p-3 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-2xl transition-all opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={20} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredStats.length === 0 && (
                                        <tr><td colSpan="5" className="px-6 py-24 text-center text-slate-300 italic font-bold">目前無此篩選條件下的紀錄</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md animate-in overflow-hidden">
                                <div className="p-7 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="font-black text-xl text-slate-800 tracking-tighter">{showModal.type === 'contract' ? '新建工程合約' : '記錄已收款項'}</h3>
                                    <button onClick={() => setShowModal(null)} className="p-2 text-slate-300 hover:text-slate-600 transition-colors">✕</button>
                                </div>
                                <div className="p-8 space-y-5">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <div className="space-y-1.5">
                                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">合約名稱</label>
                                                <input type="text" placeholder="例如：101大樓機電工程" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, name: e.target.value})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">業主公司</label>
                                                <input type="text" placeholder="輸入公司名稱" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">合約總額 (NT$)</label>
                                                <input type="number" placeholder="0" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1.5">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">保留款 %</label>
                                                    <input type="number" defaultValue="10" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">到期日期</label>
                                                    <input type="date" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-blue-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                                </div>
                                            </div>
                                            <button onClick={handleSaveContract} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-[0.98] mt-2 text-lg tracking-tighter">確認建立合約</button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="space-y-1.5 text-center p-4 bg-emerald-50 rounded-2xl border-2 border-emerald-100 mb-2">
                                                <p className="text-xs text-emerald-600 font-black tracking-widest uppercase mb-1">正在記錄已收款項</p>
                                                <p className="text-emerald-800 font-bold text-sm">請填寫實際入帳金額與發票資訊</p>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">入帳金額 (NT$)</label>
                                                <input type="number" placeholder="0" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-emerald-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1.5">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">發票號碼</label>
                                                    <input type="text" placeholder="AB-..." className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-emerald-500 focus:bg-white transition-all uppercase" onChange={e => setFormData({...formData, invoiceNo: e.target.value})} />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">發票日期</label>
                                                    <input type="date" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-bold outline-none focus:border-emerald-500 focus:bg-white transition-all" onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                                </div>
                                            </div>
                                            <button onClick={handleSavePayment} className="w-full py-5 bg-emerald-600 text-white font-black rounded-2xl shadow-xl shadow-emerald-100 hover:bg-emerald-700 transition-all active:scale-[0.98] mt-2 text-lg tracking-tighter">確認存入雲端</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
