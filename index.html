<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithRedirect, signInWithPopup, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, signInWithPopup, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .toast-enter { transform: translateY(-100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, signInWithPopup, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } = window.Firebase || {};

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB--thdJ-fp8OfQriXU6r7qnutWEPLN86Y",
            authDomain: "cashproject-9123e.firebaseapp.com",
            projectId: "cashproject-9123e",
            storageBucket: "cashproject-9123e.firebasestorage.app",
            messagingSenderId: "404273025503",
            appId: "1:404273025503:web:e3d39ddce616ddbb09f46a",
            measurementId: "G-BSGJ2BRSBB"
        };
        
        const appId = 'cash-accounting-v1';
        let auth, db, googleProvider;

        try {
            if (window.Firebase) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                googleProvider = new GoogleAuthProvider();
                googleProvider.setCustomParameters({ prompt: 'select_account' });
            }
        } catch (e) {
            console.error("Firebase Init Failed:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [vendorPayments, setVendorPayments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [authChecked, setAuthChecked] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [toast, setToast] = useState(null);
            const [error, setError] = useState(null);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '',
                amount: '', invoiceNo: '', invoiceDate: '', hasRetention: false, type: 'owner', vendor: ''
            });

            const showToast = (msg, type = "success") => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            // 1. 認證處理
            useEffect(() => {
                if (!auth) return;
                const checkAuth = async () => {
                    try {
                        await setPersistence(auth, browserLocalPersistence);
                        const res = await getRedirectResult(auth);
                        if (res?.user) setUser(res.user);
                        else if (auth.currentUser) setUser(auth.currentUser);
                    } catch (err) {
                        console.error(err);
                    } finally {
                        setTimeout(() => setAuthChecked(true), 800);
                    }
                };
                checkAuth();
                const unsub = onAuthStateChanged(auth, (u) => {
                    if (u) { setUser(u); setAuthChecked(true); }
                });
                return () => unsub();
            }, []);

            // 2. 資料同步
            useEffect(() => {
                if (!user || !db) return;
                const cCol = collection(db, 'artifacts', appId, 'users', user.uid, 'contracts');
                const oCol = collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments');
                const vCol = collection(db, 'artifacts', appId, 'users', user.uid, 'vendorPayments');

                const unsubContracts = onSnapshot(query(cCol), (snap) => {
                    setContracts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsLoading(false);
                }, (err) => {
                    setError("資料庫存取被拒。請確認 Firebase Console 中的 Rules 是否已設定。");
                });

                const unsubOwnerPay = onSnapshot(query(oCol), (snap) => {
                    setOwnerPayments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubVendorPay = onSnapshot(query(vCol), (snap) => {
                    setVendorPayments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubContracts(); unsubOwnerPay(); unsubVendorPay(); };
            }, [user]);

            const handleGoogleLogin = async () => {
                try {
                    setAuthChecked(false);
                    const isMessenger = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent);
                    if (isMessenger) await signInWithRedirect(auth, googleProvider);
                    else {
                        const res = await signInWithPopup(auth, googleProvider);
                        setUser(res.user);
                        setAuthChecked(true);
                    }
                } catch (err) {
                    setError("登入失敗: " + err.message);
                    setAuthChecked(true);
                }
            };

            const stats = useMemo(() => {
                return contracts.map(c => {
                    const ownerPaid = ownerPayments.filter(p => p.contractId === c.id).reduce((s, p) => s + Number(p.amount), 0);
                    const vendorPaid = vendorPayments.filter(p => p.contractId === c.id).reduce((s, p) => s + Number(p.amount), 0);
                    const ret = (Number(c.totalAmount) * (c.hasRetention ? Number(c.retentionRate) : 0)) / 100;
                    const isExp = c.hasRetention && c.retentionExpiry && new Date(c.retentionExpiry) <= new Date(Date.now() + 30*24*60*60*1000);
                    return { ...c, ownerPaid, vendorPaid, retentionAmount: ret, isExpiring: isExp };
                });
            }, [contracts, ownerPayments, vendorPayments]);

            const filteredStats = stats.filter(s => (s.year === filterYear) && (filterCompany === 'All' || s.owner === filterCompany));

            const handleSaveContract = async () => {
                if (!user || !db) return;
                setIsSaving(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'contracts'), {
                        name: formData.name,
                        owner: formData.owner,
                        totalAmount: Number(formData.totalAmount) || 0,
                        hasRetention: formData.hasRetention,
                        retentionRate: formData.hasRetention ? Number(formData.retentionRate) : 0,
                        retentionExpiry: formData.hasRetention ? formData.retentionExpiry : '',
                        year: filterYear,
                        createdAt: Date.now()
                    });
                    showToast("合約已成功同步至雲端");
                    setShowModal(null);
                    setFormData({ name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '', hasRetention: false, type: 'owner', vendor: '' });
                } catch (err) {
                    setError("存檔失敗: " + err.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const handleSavePayment = async () => {
                if (!user || !db) return;
                setIsSaving(true);
                try {
                    const isOwner = formData.type === 'owner';
                    const colName = isOwner ? 'ownerPayments' : 'vendorPayments';
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, colName), {
                        contractId: showModal.contractId,
                        amount: Number(formData.amount) || 0,
                        invoiceNo: formData.invoiceNo || '',
                        invoiceDate: formData.invoiceDate || '',
                        vendor: isOwner ? undefined : formData.vendor,
                        createdAt: Date.now()
                    });
                    showToast(isOwner ? "業主收款紀錄已儲存" : "廠商付款紀錄已儲存");
                    setShowModal(null);
                    setFormData({ ...formData, amount: '', invoiceNo: '', invoiceDate: '', vendor: '' });
                } catch (err) {
                    setError("記帳失敗: " + err.message);
                } finally {
                    setIsSaving(false);
                }
            };

            if (!authChecked) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="flex flex-col items-center">
                        <div className="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-400 font-bold text-xs tracking-widest uppercase">Initializing Cloud...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border-4 border-white animate-in">
                        <div className="flex justify-center mb-6">
                            <div className="p-6 bg-blue-600 text-white rounded-[2rem] shadow-xl"><Icon name="shield-check" size={48} /></div>
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 mb-2">雲端記帳系統</h1>
                        <p className="text-slate-400 mb-10 font-bold text-sm">請登入您的 Google 帳號</p>
                        {error && <div className="bg-rose-50 text-rose-600 text-[10px] p-4 rounded-2xl mb-6 font-bold">{error}</div>}
                        <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-slate-900 py-4.5 rounded-[1.5rem] font-black text-white hover:bg-slate-800 shadow-xl active:scale-95 transition-all mb-4">
                            Google 登入
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-10 animate-in bg-slate-50 pb-24">
                    {toast && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl font-black text-white text-sm animate-in flex items-center gap-2 ${toast.type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`}>
                            <Icon name={toast.type === 'success' ? "check-circle" : "alert-circle"} size={18} />
                            {toast.msg}
                        </div>
                    )}

                    <header className="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-slate-200 pb-10">
                        <div className="flex items-center gap-4">
                            {user.photoURL && <img src={user.photoURL} className="w-14 h-14 rounded-2xl border-4 border-white shadow-lg" />}
                            <div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tighter">工程記帳系統</h1>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">{user.displayName}</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => { setFormData({...formData, hasRetention: false, type: 'owner'}); setShowModal({ type: 'contract' }); }} className="bg-blue-600 text-white px-6 py-3.5 rounded-2xl flex items-center gap-2 shadow-xl shadow-blue-100 font-black transition-all hover:bg-blue-700 active:scale-95"><Icon name="plus" size={20} /> 新增合約</button>
                            <button onClick={() => signOut(auth).then(() => window.location.reload())} className="bg-white text-slate-400 border px-6 py-3.5 rounded-2xl font-black active:scale-95 transition-all">登出</button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto mb-8 flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                        <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="p-4 bg-white border-2 border-slate-100 rounded-2xl text-sm font-black shadow-sm outline-none focus:border-blue-500">
                            {[2024, 2025, 2026].map(y => <option key={y} value={y}>{y} 年度</option>)}
                        </select>
                        <select value={filterCompany} onChange={e => setFilterCompany(e.target.value)} className="p-4 bg-white border-2 border-slate-100 rounded-2xl text-sm font-black flex-grow shadow-sm outline-none focus:border-blue-500">
                            <option value="All">所有業主公司</option>
                            {[...new Set(contracts.map(c => c.owner))].map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </div>

                    <main className="max-w-7xl mx-auto space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 font-black">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm flex items-center gap-5">
                                <div className="p-4 bg-indigo-500 text-white rounded-2xl"><Icon name="dollar-sign" size={28} /></div>
                                <div><p className="text-[10px] text-slate-300 uppercase tracking-widest">年度合約總額</p><p className="text-2xl">${filteredStats.reduce((a, b) => a + b.totalAmount, 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm flex items-center gap-5">
                                <div className="p-4 bg-emerald-500 text-white rounded-2xl"><Icon name="check-circle" size={28} /></div>
                                <div><p className="text-[10px] text-slate-300 uppercase tracking-widest">業主累計付款</p><p className="text-2xl text-emerald-600">${filteredStats.reduce((a, b) => a + b.ownerPaid, 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm flex items-center gap-5">
                                <div className="p-4 bg-amber-500 text-white rounded-2xl"><Icon name="clock" size={28} /></div>
                                <div><p className="text-[10px] text-slate-300 uppercase tracking-widest">預計可領保留款</p><p className="text-2xl text-amber-500">${filteredStats.reduce((a, b) => a + b.retentionAmount, 0).toLocaleString()}</p></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
                            <div className="overflow-x-auto font-medium">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50/50 text-[10px] font-black uppercase text-slate-400 border-b tracking-widest">
                                        <tr>
                                            <th className="px-8 py-6">工程案名</th>
                                            <th className="px-8 py-6">總額</th>
                                            <th className="px-8 py-6 text-emerald-600">業主已付</th>
                                            <th className="px-8 py-6 text-blue-600">廠商已付</th>
                                            <th className="px-8 py-6 text-amber-600">保留款</th>
                                            <th className="px-8 py-6 text-right">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {filteredStats.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="px-8 py-8 font-black text-slate-700 text-lg">{item.name}<div className="text-[10px] text-slate-300 font-bold uppercase mt-1">{item.owner}</div></td>
                                                <td className="px-8 py-8 font-mono font-bold text-slate-400">${item.totalAmount.toLocaleString()}</td>
                                                <td className="px-8 py-8 font-mono font-black text-emerald-600 text-lg">${item.ownerPaid.toLocaleString()}</td>
                                                <td className="px-8 py-8 font-mono font-black text-blue-600 text-lg">${item.vendorPaid.toLocaleString()}</td>
                                                <td className="px-8 py-8 font-mono font-black text-amber-500 text-lg">
                                                    {item.hasRetention ? (
                                                        <>
                                                            ${item.retentionAmount.toLocaleString()}
                                                            <div className="text-[9px] text-slate-300">到期: {item.retentionExpiry || '--'}</div>
                                                        </>
                                                    ) : (
                                                        <span className="text-slate-200 text-xs italic">無</span>
                                                    )}
                                                </td>
                                                <td className="px-8 py-8 text-right flex justify-end gap-2">
                                                    <button onClick={() => { setFormData({...formData, amount:'', invoiceNo:'', invoiceDate:'', type: 'owner', vendor: ''}); setShowModal({type:'payment', contractId:item.id}); }} className="p-4 bg-blue-50 text-blue-600 rounded-2xl active:scale-90 transition-all"><Icon name="plus" size={24} /></button>
                                                    <button onClick={() => { if(confirm('確定要刪除嗎？雲端資料將無法復原。')) deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contracts', item.id)); }} className="p-4 text-slate-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={24} /></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-md border-8 border-white my-auto animate-in overflow-hidden">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50 font-black text-slate-800">
                                    <h3 className="text-xl">{showModal.type === 'contract' ? '新建雲端合約' : '款項紀錄'}</h3>
                                    <button onClick={() => setShowModal(null)} className="text-slate-300 hover:text-slate-600"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-10 space-y-6">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <input type="text" placeholder="工程案名" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-blue-600" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                            <input type="text" placeholder="業主公司" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-blue-600" value={formData.owner} onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            <input type="number" placeholder="合約總金額" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-blue-600 font-mono" value={formData.totalAmount} onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                            
                                            <div className="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100">
                                                <input 
                                                    type="checkbox" 
                                                    id="retention-check"
                                                    className="w-6 h-6 rounded-lg border-slate-300 text-blue-600 focus:ring-blue-500" 
                                                    checked={formData.hasRetention}
                                                    onChange={e => setFormData({...formData, hasRetention: e.target.checked})}
                                                />
                                                <label htmlFor="retention-check" className="font-black text-slate-600 text-sm cursor-pointer">啟用保留款項目</label>
                                            </div>

                                            {formData.hasRetention && (
                                                <div className="grid grid-cols-2 gap-4 animate-in">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 ml-1">保留 %</label>
                                                        <input type="number" placeholder="%" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-blue-600" value={formData.retentionRate} onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black text-slate-400 ml-1">到期日</label>
                                                        <input type="date" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-blue-600" value={formData.retentionExpiry} onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                                    </div>
                                                </div>
                                            )}

                                            <button onClick={handleSaveContract} disabled={isSaving} className="w-full py-5 bg-blue-600 text-white font-black rounded-3xl shadow-xl disabled:bg-blue-300 flex justify-center gap-2 text-lg">
                                                {isSaving ? <Icon name="loader-2" className="animate-spin" /> : "確認建立並同步"}
                                            </button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 text-center block">款項類別</label>
                                                <div className="flex p-1.5 bg-slate-100 rounded-3xl">
                                                    <button onClick={() => setFormData({...formData, type: 'owner'})} className={`flex-1 py-3 text-sm font-black rounded-2xl transition-all ${formData.type === 'owner' ? 'bg-white shadow-sm text-emerald-600' : 'text-slate-400'}`}>業主收款</button>
                                                    <button onClick={() => setFormData({...formData, type: 'vendor'})} className={`flex-1 py-3 text-sm font-black rounded-2xl transition-all ${formData.type === 'vendor' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>廠商付款</button>
                                                </div>
                                            </div>

                                            <div className="space-y-3">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 text-center block">入帳金額 (NT$)</label>
                                                <input type="number" placeholder="0" className={`w-full p-6 border-4 rounded-[2.5rem] text-3xl font-black outline-none transition-all shadow-inner font-mono text-center ${formData.type === 'owner' ? 'bg-emerald-50 border-emerald-100 focus:border-emerald-600 text-emerald-600' : 'bg-blue-50 border-blue-100 focus:border-blue-600 text-blue-600'}`} value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            </div>

                                            {formData.type === 'vendor' && (
                                                <div className="space-y-2 animate-in">
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">廠商名稱</label>
                                                    <input type="text" placeholder="輸入收款的下包廠商名稱" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-blue-600" value={formData.vendor} onChange={e => setFormData({...formData, vendor: e.target.value})} />
                                                </div>
                                            )}

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-1">發票號碼</label>
                                                    <input type="text" placeholder="AB-..." className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black uppercase outline-none focus:border-slate-300" value={formData.invoiceNo} onChange={e => setFormData({...formData, invoiceNo: e.target.value})} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-1">發票日期</label>
                                                    <input type="date" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-black outline-none focus:border-slate-300" value={formData.invoiceDate} onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                                </div>
                                            </div>
                                            
                                            <button onClick={handleSavePayment} disabled={isSaving} className={`w-full py-5 text-white font-black rounded-3xl shadow-xl transition-all flex justify-center gap-2 text-lg ${formData.type === 'owner' ? 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-100' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-100'} disabled:bg-slate-300`}>
                                                {isSaving ? <Icon name="loader-2" className="animate-spin" /> : "確認儲存並同步"}
                                            </button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
