<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.Firebase = { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { initializeApp, getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, setPersistence, browserLocalPersistence, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } = window.Firebase || {};

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB--thdJ-fp8OfQriXU6r7qnutWEPLN86Y",
            authDomain: "cashproject-9123e.firebaseapp.com",
            projectId: "cashproject-9123e",
            storageBucket: "cashproject-9123e.firebasestorage.app",
            messagingSenderId: "404273025503",
            appId: "1:404273025503:web:e3d39ddce616ddbb09f46a",
            measurementId: "G-BSGJ2BRSBB"
        };
        
        const appId = 'cash-accounting-v1';
        let auth, db, googleProvider;

        try {
            if (window.Firebase) {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                googleProvider = new GoogleAuthProvider();
                googleProvider.setCustomParameters({ prompt: 'select_account' });
            }
        } catch (e) {
            console.error("Firebase 初始化失敗:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [authChecked, setAuthChecked] = useState(false); 
            const [error, setError] = useState(null);
            const [copySuccess, setCopySuccess] = useState(false);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '',
                amount: '', invoiceNo: '', invoiceDate: ''
            });

            // 1. 核心認證修復邏輯 (專治 Safari 迴圈)
            useEffect(() => {
                if (!auth) return;

                const runAuthCheck = async () => {
                    try {
                        // 步驟 A: 強制設定持久化
                        await setPersistence(auth, browserLocalPersistence);
                        
                        // 步驟 B: 獲取 Redirect 結果
                        const result = await getRedirectResult(auth);
                        if (result?.user) {
                            setUser(result.user);
                            setAuthChecked(true);
                            return;
                        }

                        // 步驟 C: 針對 Safari 進行延遲判定 (給予瀏覽器時間讀取 IndexedDB)
                        setTimeout(() => {
                            if (auth.currentUser) {
                                setUser(auth.currentUser);
                            }
                            setAuthChecked(true);
                        }, 1000);

                    } catch (err) {
                        console.error("認證初始化異常:", err);
                        if (err.code === 'auth/unauthorized-domain') {
                            setError(`網域未授權：請將「${window.location.hostname}」加入 Firebase Console。`);
                        } else {
                            setError(`登入異常: ${err.message}`);
                        }
                        setAuthChecked(true);
                    }
                };

                runAuthCheck();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setError(null);
                        setAuthChecked(true);
                    }
                });
                
                return () => unsubscribe();
            }, []);

            // 2. 監聽 Firestore 資料
            useEffect(() => {
                if (!user || !db) return;
                setIsLoading(true);

                const contractsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'contracts');
                const ownerPaymentsCol = collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments');

                const unsubContracts = onSnapshot(query(contractsCol), (snapshot) => {
                    setContracts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setIsLoading(false);
                }, (err) => {
                    console.error("Firestore 錯誤:", err);
                    setIsLoading(false);
                });

                const unsubOwnerPay = onSnapshot(query(ownerPaymentsCol), (snapshot) => {
                    setOwnerPayments(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => {
                    unsubContracts();
                    unsubOwnerPay();
                };
            }, [user]);

            const handleGoogleLogin = async () => {
                try {
                    setError(null);
                    setAuthChecked(false); 
                    await signInWithRedirect(auth, googleProvider);
                } catch (err) {
                    console.error("發起登入失敗:", err);
                    setError(`發起登入失敗: ${err.message}`);
                    setAuthChecked(true);
                }
            };

            const handleLogout = async () => {
                try { 
                    await signOut(auth); 
                    setUser(null);
                    window.location.reload(); 
                } catch (err) { console.error(err); }
            };

            const handleCopyUrl = () => {
                const el = document.createElement('textarea');
                el.value = window.location.href;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            const stats = useMemo(() => {
                return contracts.map(contract => {
                    const oPay = ownerPayments
                        .filter(p => p.contractId === contract.id)
                        .reduce((sum, p) => sum + Number(p.amount), 0);
                    const retentionAmount = (Number(contract.totalAmount) * Number(contract.retentionRate)) / 100;
                    const expiryDate = new Date(contract.retentionExpiry);
                    const isRetentionExpiring = contract.retentionExpiry ? expiryDate <= new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) : false;

                    return {
                        ...contract,
                        ownerPaid: oPay,
                        retentionAmount,
                        alerts: { retentionExpiring: isRetentionExpiring }
                    };
                });
            }, [contracts, ownerPayments]);

            const filteredStats = useMemo(() => {
                return stats.filter(s => {
                    const yearMatch = s.year === filterYear;
                    const companyMatch = filterCompany === 'All' || s.owner === filterCompany;
                    return yearMatch && companyMatch;
                });
            }, [stats, filterYear, filterCompany]);

            const handleSaveContract = async () => {
                if (!user || !db) return;
                const newContract = {
                    name: formData.name || '未命名合約',
                    owner: formData.owner || '未知業主',
                    totalAmount: Number(formData.totalAmount) || 0,
                    retentionRate: Number(formData.retentionRate) || 10,
                    retentionExpiry: formData.retentionExpiry || '',
                    year: filterYear,
                    startDate: new Date().toISOString().split('T')[0]
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'contracts'), newContract);
                setShowModal(null);
            };

            const handleSavePayment = async () => {
                if (!user || !db) return;
                const newPayment = {
                    contractId: showModal.contractId,
                    amount: Number(formData.amount) || 0,
                    invoiceNo: formData.invoiceNo || '',
                    invoiceDate: formData.invoiceDate || '',
                    status: '已收',
                };
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ownerPayments'), newPayment);
                setShowModal(null);
            };

            const handleDeleteContract = async (id) => {
                if (!user || !db || !confirm('確定要刪除嗎？')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'contracts', id));
            };

            if (!authChecked) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-white">
                        <div className="flex flex-col items-center">
                            <div className="w-12 h-12 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                            <h2 className="text-slate-800 font-black text-lg italic">Security Checking...</h2>
                            <p className="text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase">正在同步雲端安全認證</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                const isMessenger = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent);
                const isSafari = /Safari/i.test(navigator.userAgent) && !/Chrome/i.test(navigator.userAgent);

                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6 animate-in">
                        <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border-4 border-white">
                            <div className="flex justify-center mb-6">
                                <div className="p-6 bg-blue-600 text-white rounded-[2rem] shadow-xl rotate-3"><Icon name="shield-check" size={48} /></div>
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 mb-2">雲端記帳系統</h1>
                            <p className="text-slate-400 mb-10 font-bold uppercase tracking-widest text-[10px]">Construction Accounting</p>
                            
                            {(isMessenger || isSafari) && (
                                <div className="bg-amber-50 text-amber-800 text-[11px] p-4 rounded-2xl mb-8 text-left border border-amber-200 leading-relaxed font-black shadow-sm">
                                    <div className="flex gap-2 mb-1">
                                        <Icon name="alert-triangle" size={14} className="shrink-0" />
                                        <span>給 iPhone / Safari 使用者</span>
                                    </div>
                                    <p>若無法登入，請進入手機「設定」>「Safari」> 關閉「阻擋所有 Cookie」與「防止跨站追蹤」。或點擊「複製網址」改用 Chrome 開啟。</p>
                                </div>
                            )}

                            {error && (
                                <div className="bg-rose-50 text-rose-600 text-xs p-4 rounded-2xl mb-6 text-left border border-rose-200 font-bold">{error}</div>
                            )}

                            <button 
                                onClick={handleGoogleLogin}
                                className="w-full flex items-center justify-center gap-3 bg-slate-900 py-4.5 rounded-[1.5rem] font-black text-white hover:bg-slate-800 shadow-xl active:scale-95 transition-all mb-5 text-lg"
                            >
                                <svg className="w-6 h-6" viewBox="0 0 24 24">
                                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                </svg>
                                點此開始登入
                            </button>

                            <button onClick={handleCopyUrl} className={`w-full flex items-center justify-center gap-2 py-4 rounded-[1.25rem] font-black text-xs transition-all ${copySuccess ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-100 text-slate-500'}`}>
                                <Icon name={copySuccess ? "check" : "copy"} size={14} />
                                {copySuccess ? "網址已複製" : "複製網址 (使用 Chrome)"}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-10 animate-in bg-slate-50 pb-20">
                    <header className="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-slate-200 pb-10">
                        <div className="flex items-center gap-5">
                            {user.photoURL && <img src={user.photoURL} alt="Avatar" className="w-16 h-16 rounded-3xl border-4 border-white shadow-xl rotate-3" />}
                            <div>
                                <h1 className="text-4xl font-black text-slate-800 tracking-tighter">工程記帳<span className="text-blue-600">系統</span></h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <div className="px-2 py-0.5 bg-emerald-500 text-white text-[9px] font-black rounded-md uppercase tracking-widest sync-indicator">Cloud Sync</div>
                                    <p className="text-slate-400 text-xs font-bold">{user.displayName}</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setShowModal({ type: 'contract' })} className="bg-blue-600 text-white px-8 py-4 rounded-[1.5rem] flex items-center gap-2 shadow-2xl shadow-blue-200 active:scale-95 text-base font-black transition-all hover:bg-blue-700">
                                <Icon name="plus" size={20} /> 新增合約
                            </button>
                            <button onClick={handleLogout} className="bg-white text-slate-400 border-2 border-slate-100 px-6 py-4 rounded-[1.5rem] text-base font-black hover:bg-slate-50 transition-all active:scale-95">登出</button>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto mb-8 flex gap-3 overflow-x-auto pb-4 no-scrollbar">
                        <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="p-4.5 bg-white border-2 border-slate-50 rounded-2xl text-sm outline-none shadow-sm font-black min-w-[140px] focus:border-blue-600 transition-all cursor-pointer">
                            <option value="2024">2024 年度</option>
                            <option value="2025">2025 年度</option>
                            <option value="2026">2026 年度</option>
                        </select>
                        <select value={filterCompany} onChange={e => setFilterCompany(e.target.value)} className="p-4.5 bg-white border-2 border-slate-50 rounded-2xl text-sm outline-none shadow-sm font-black flex-grow focus:border-blue-600 transition-all cursor-pointer">
                            <option value="All">顯示所有業主公司資料</option>
                            {[...new Set(contracts.map(c => c.owner))].map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </div>

                    <main className="max-w-7xl mx-auto space-y-10">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="bg-white p-8 rounded-[3rem] border-2 border-slate-50 shadow-sm flex items-center gap-6 transition-transform hover:scale-[1.02]">
                                <div className="p-5 bg-indigo-600 text-white rounded-3xl shadow-xl shadow-indigo-100"><Icon name="dollar-sign" size={32} /></div>
                                <div><p className="text-[11px] text-slate-400 font-black uppercase tracking-widest mb-1 text-nowrap">年度合約總額</p><p className="text-3xl font-black text-slate-800">${filteredStats.reduce((a, b) => a + Number(b.totalAmount), 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-8 rounded-[3rem] border-2 border-slate-50 shadow-sm flex items-center gap-6 transition-transform hover:scale-[1.02]">
                                <div className="p-5 bg-emerald-600 text-white rounded-3xl shadow-xl shadow-emerald-100"><Icon name="check-circle" size={32} /></div>
                                <div><p className="text-[11px] text-slate-400 font-black uppercase tracking-widest mb-1 text-nowrap">累計已收款項</p><p className="text-3xl font-black text-emerald-600">${filteredStats.reduce((a, b) => a + b.ownerPaid, 0).toLocaleString()}</p></div>
                            </div>
                            <div className="bg-white p-8 rounded-[3rem] border-2 border-slate-50 shadow-sm flex items-center gap-6 transition-transform hover:scale-[1.02]">
                                <div className="p-5 bg-amber-600 text-white rounded-3xl shadow-xl shadow-amber-100"><Icon name="clock" size={32} /></div>
                                <div><p className="text-[11px] text-slate-400 font-black uppercase tracking-widest mb-1 text-nowrap">待領保留款額</p><p className="text-3xl font-black text-amber-500">${filteredStats.reduce((a, b) => a + b.retentionAmount, 0).toLocaleString()}</p></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-[3rem] border-2 border-slate-50 shadow-sm overflow-hidden border-slate-200">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead className="bg-slate-50/50 text-[10px] font-black uppercase text-slate-400 border-b tracking-[0.2em]">
                                        <tr>
                                            <th className="px-10 py-8">合約案名 / 業主公司</th>
                                            <th className="px-10 py-8">合約總額</th>
                                            <th className="px-10 py-8 text-emerald-600">已收款</th>
                                            <th className="px-10 py-8 text-amber-600">待領保留款</th>
                                            <th className="px-10 py-8 text-right">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                        {filteredStats.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="px-10 py-10">
                                                    <div className="font-black text-slate-700 text-2xl tracking-tight mb-1">{item.name}</div>
                                                    <div className="text-sm text-slate-400 font-bold flex items-center gap-1.5 uppercase">
                                                        <Icon name="building" size={14} /> {item.owner}
                                                    </div>
                                                </td>
                                                <td className="px-10 py-10 text-lg font-bold text-slate-400 font-mono">${Number(item.totalAmount).toLocaleString()}</td>
                                                <td className="px-10 py-10 font-black text-emerald-600 text-xl font-mono">${item.ownerPaid.toLocaleString()}</td>
                                                <td className="px-10 py-10">
                                                    <div className={`font-black text-xl font-mono ${item.alerts.retentionExpiring ? "text-rose-500 animate-pulse" : "text-amber-500"}`}>
                                                        ${item.retentionAmount.toLocaleString()}
                                                    </div>
                                                    <div className="text-[10px] text-slate-300 font-bold mt-2 flex items-center gap-1 uppercase">
                                                        <Icon name="calendar" size={10} /> 到期: {item.retentionExpiry || '未定'}
                                                    </div>
                                                </td>
                                                <td className="px-10 py-10 text-right flex justify-end gap-3 items-center">
                                                    <button onClick={() => { setFormData({...formData, type: 'owner'}); setShowModal({type: 'payment', contractId: item.id}); }} className="p-5 bg-blue-50 text-blue-600 rounded-[1.5rem] hover:bg-blue-600 hover:text-white transition-all shadow-sm active:scale-90"><Icon name="plus" size={28} /></button>
                                                    <button onClick={() => handleDeleteContract(item.id)} className="p-5 text-slate-200 hover:text-rose-500 hover:bg-rose-50 rounded-[1.5rem] transition-all opacity-0 group-hover:opacity-100 active:scale-90"><Icon name="trash-2" size={28} /></button>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredStats.length === 0 && (
                                            <tr><td colSpan="5" className="px-6 py-40 text-center text-slate-200 italic font-black text-2xl tracking-tighter">尚無合約紀錄</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-[3.5rem] shadow-2xl w-full max-w-md animate-in overflow-hidden border-8 border-white my-auto">
                                <div className="p-10 border-b flex justify-between items-center bg-slate-50/50">
                                    <h3 className="font-black text-2xl text-slate-800 tracking-tighter">{showModal.type === 'contract' ? '新建合約' : '記錄款項'}</h3>
                                    <button onClick={() => setShowModal(null)} className="p-3 text-slate-300 hover:text-slate-600 transition-colors"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-12 space-y-8 text-left">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <div className="space-y-3">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">工程案名</label>
                                                <input type="text" placeholder="例如：新店廠房工程" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-lg font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner" onChange={e => setFormData({...formData, name: e.target.value})} />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">業主公司</label>
                                                <input type="text" placeholder="輸入公司名稱" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-lg font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner" onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">金額 (NT$)</label>
                                                <input type="number" placeholder="0" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-xl font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner font-mono" onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="space-y-3">
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">保留 %</label>
                                                    <input type="number" defaultValue="10" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-lg font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner" onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">到期日</label>
                                                    <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-sm font-black outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner" onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                                </div>
                                            </div>
                                            <button onClick={handleSaveContract} className="w-full py-6.5 bg-blue-600 text-white font-black rounded-[2.5rem] shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-[0.98] mt-6 text-xl tracking-tighter">確認建立</button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="space-y-3">
                                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 text-center block">入帳金額 (NT$)</label>
                                                <input type="number" placeholder="0" className="w-full p-6 bg-emerald-50 border-4 border-emerald-100 rounded-[2.5rem] text-3xl font-black outline-none focus:border-emerald-600 focus:bg-white transition-all shadow-inner font-mono text-center text-emerald-600" onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="space-y-3">
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">發票號碼</label>
                                                    <input type="text" placeholder="AB-..." className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-base font-black outline-none focus:border-emerald-500 focus:bg-white transition-all shadow-inner uppercase" onChange={e => setFormData({...formData, invoiceNo: e.target.value})} />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">發票日期</label>
                                                    <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl text-xs font-black outline-none focus:border-emerald-500 focus:bg-white transition-all shadow-inner" onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                                </div>
                                            </div>
                                            <button onClick={handleSavePayment} className="w-full py-6.5 bg-emerald-600 text-white font-black rounded-[2.5rem] shadow-2xl shadow-emerald-100 hover:bg-emerald-700 transition-all active:scale-[0.98] mt-6 text-xl tracking-tighter uppercase">存入雲端數據</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
