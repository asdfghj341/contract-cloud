<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程合約記帳管理系統</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // 模擬 Lucide 圖示組件
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // --- 狀態管理 (初始值改為空陣列) ---
            const [contracts, setContracts] = useState([]);
            const [ownerPayments, setOwnerPayments] = useState([]);
            const [vendorPayments, setVendorPayments] = useState([]);

            const [filterCompany, setFilterCompany] = useState('All');
            const [filterYear, setFilterYear] = useState(new Date().getFullYear().toString());
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showModal, setShowModal] = useState(null);

            const [formData, setFormData] = useState({
                name: '', owner: '', totalAmount: '', retentionRate: 10, retentionExpiry: '',
                type: 'owner', amount: '', invoiceNo: '', invoiceDate: '', vendor: ''
            });

            // --- 計算邏輯 ---
            const stats = useMemo(() => {
                return contracts.map(contract => {
                    const ownerPaid = ownerPayments
                        .filter(p => p.contractId === contract.id && p.status === '已收')
                        .reduce((sum, p) => sum + p.amount, 0);
                    
                    const vendorPaid = vendorPayments
                        .filter(v => v.contractId === contract.id && v.status === '已付')
                        .reduce((sum, v) => sum + v.amount, 0);

                    const retentionAmount = (contract.totalAmount * contract.retentionRate) / 100;
                    const today = new Date();
                    const expiryDate = new Date(contract.retentionExpiry);
                    const isRetentionExpiring = contract.retentionExpiry ? expiryDate <= new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000) : false;

                    return {
                        ...contract,
                        ownerPaid, vendorPaid, retentionAmount,
                        alerts: {
                            vendorLagging: ownerPaid > vendorPaid && vendorPaid > 0,
                            ownerLagging: vendorPaid > ownerPaid,
                            retentionExpiring: isRetentionExpiring
                        }
                    };
                });
            }, [contracts, ownerPayments, vendorPayments]);

            const companies = useMemo(() => {
                const list = new Set();
                contracts.forEach(c => list.add(c.owner));
                return ['All', ...Array.from(list)];
            }, [contracts]);

            const filteredStats = useMemo(() => {
                return stats.filter(s => {
                    const yearMatch = s.year === filterYear;
                    const companyMatch = filterCompany === 'All' || s.owner === filterCompany;
                    return yearMatch && companyMatch;
                });
            }, [stats, filterYear, filterCompany]);

            const handleSaveContract = () => {
                const newContract = {
                    id: Date.now().toString(),
                    name: formData.name || '未命名合約',
                    owner: formData.owner || '未知業主',
                    totalAmount: Number(formData.totalAmount) || 0,
                    retentionRate: Number(formData.retentionRate) || 10,
                    retentionExpiry: formData.retentionExpiry || '',
                    year: new Date().getFullYear().toString(),
                    startDate: new Date().toISOString().split('T')[0]
                };
                setContracts([...contracts, newContract]);
                setShowModal(null);
                setFormData({ ...formData, name: '', owner: '', totalAmount: '', retentionExpiry: '' });
            };

            const handleSavePayment = () => {
                const isOwner = formData.type === 'owner';
                const newPayment = {
                    id: Date.now().toString(),
                    contractId: showModal.contractId,
                    amount: Number(formData.amount) || 0,
                    date: formData.invoiceDate || new Date().toISOString().split('T')[0],
                    invoiceNo: formData.invoiceNo || '',
                    invoiceDate: formData.invoiceDate || '',
                    status: isOwner ? '已收' : '已付',
                    vendor: isOwner ? undefined : (formData.vendor || '未知廠商')
                };
                if (isOwner) setOwnerPayments([...ownerPayments, newPayment]);
                else setVendorPayments([...vendorPayments, newPayment]);
                setShowModal(null);
                setFormData({ ...formData, amount: '', invoiceNo: '', invoiceDate: '', vendor: '' });
            };

            const SummaryCard = ({ title, value, iconName, color }) => (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div className={`p-3 rounded-xl ${color} text-white flex items-center justify-center`}>
                        <Icon name={iconName} size={24} />
                    </div>
                    <div>
                        <p className="text-sm text-gray-500 font-medium">{title}</p>
                        <p className="text-2xl font-bold text-gray-800">${value.toLocaleString()}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                        <div>
                            <h1 className="text-3xl font-extrabold tracking-tight text-slate-800">工程合約記帳系統</h1>
                            <p className="text-slate-500 mt-1">追蹤合約進度、發票管理與保留款提醒</p>
                        </div>
                        <button 
                            onClick={() => setShowModal({ type: 'contract' })}
                            className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-blue-200"
                        >
                            <Icon name="plus" size={20} /> 新增合約
                        </button>
                    </div>

                    {/* Filters */}
                    <div className="max-w-7xl mx-auto mb-6">
                        <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex p-1 bg-gray-50 rounded-xl">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded-lg text-sm font-medium ${activeTab === 'dashboard' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>儀表板</button>
                                <button onClick={() => setActiveTab('contracts')} className={`px-4 py-2 rounded-lg text-sm font-medium ${activeTab === 'contracts' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>合約清單</button>
                            </div>
                            <div className="flex gap-4">
                                <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="bg-gray-50 border-none text-sm rounded-lg p-2 outline-none">
                                    <option value="2024">2024 年度</option>
                                    <option value="2025">2025 年度</option>
                                    <option value="2026">2026 年度</option>
                                </select>
                                <select value={filterCompany} onChange={(e) => setFilterCompany(e.target.value)} className="bg-gray-50 border-none text-sm rounded-lg p-2 outline-none">
                                    {companies.map(c => <option key={c} value={c}>{c === 'All' ? '所有公司' : c}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto space-y-8">
                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in">
                                <SummaryCard title="年度合約總額" value={filteredStats.reduce((sum, s) => sum + s.totalAmount, 0)} iconName="dollar-sign" color="bg-indigo-500" />
                                <SummaryCard title="已收業主款項" value={filteredStats.reduce((sum, s) => sum + s.ownerPaid, 0)} iconName="check-circle" color="bg-emerald-500" />
                                <SummaryCard title="待結保留款" value={filteredStats.reduce((sum, s) => sum + s.retentionAmount, 0)} iconName="clock" color="bg-amber-500" />
                            </div>
                        )}

                        {/* Alerts */}
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold flex items-center gap-2 text-slate-700"><Icon name="alert-triangle" size={20} className="text-amber-500" /> 系統提醒</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filteredStats.filter(s => s.alerts.vendorLagging || s.alerts.retentionExpiring).length > 0 ? (
                                    filteredStats.map(s => (
                                        <React.Fragment key={s.id}>
                                            {s.alerts.vendorLagging && (
                                                <div className="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl flex items-start gap-3">
                                                    <Icon name="arrow-right-left" className="text-amber-600 mt-1" />
                                                    <div>
                                                        <p className="font-bold text-amber-900">{s.name}</p>
                                                        <p className="text-sm text-amber-700">業主已付但廠商進度落後！</p>
                                                    </div>
                                                </div>
                                            )}
                                            {s.alerts.retentionExpiring && (
                                                <div className="bg-blue-50 border-l-4 border-blue-400 p-4 rounded-r-xl flex items-start gap-3">
                                                    <Icon name="clock" className="text-blue-600 mt-1" />
                                                    <div>
                                                        <p className="font-bold text-blue-900">{s.name}</p>
                                                        <p className="text-sm text-blue-700">保留款即將到期：{s.retentionExpiry}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    ))
                                ) : (
                                    <p className="text-gray-400 text-sm italic col-span-2">目前無異常警示事項。</p>
                                )}
                            </div>
                        </div>

                        {/* Table */}
                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-gray-50 text-gray-500 text-xs font-bold uppercase">
                                        <tr>
                                            <th className="px-6 py-4">合約名稱</th>
                                            <th className="px-6 py-4">總額</th>
                                            <th className="px-6 py-4 text-emerald-600">業主已付</th>
                                            <th className="px-6 py-4 text-blue-600">廠商已付</th>
                                            <th className="px-6 py-4">保留款 (到期)</th>
                                            <th className="px-6 py-4 text-right">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-50">
                                        {filteredStats.map(item => (
                                            <tr key={item.id} className="hover:bg-slate-50 transition-colors group text-sm">
                                                <td className="px-6 py-5 font-bold">{item.name}<div className="text-xs text-gray-400">{item.owner}</div></td>
                                                <td className="px-6 py-5">${item.totalAmount.toLocaleString()}</td>
                                                <td className="px-6 py-5 font-bold text-emerald-600">${item.ownerPaid.toLocaleString()}</td>
                                                <td className="px-6 py-5 font-bold text-blue-600">${item.vendorPaid.toLocaleString()}</td>
                                                <td className="px-6 py-5 font-bold text-amber-600">${item.retentionAmount.toLocaleString()}<div className="text-[10px] text-gray-400">{item.retentionExpiry || '未設定'}</div></td>
                                                <td className="px-6 py-5 text-right flex justify-end gap-2">
                                                    <button onClick={() => setShowModal({ type: 'payment', contractId: item.id })} className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg" title="記帳"><Icon name="plus" size={18} /></button>
                                                    <button onClick={() => setContracts(contracts.filter(c => c.id !== item.id))} className="p-2 text-rose-600 hover:bg-rose-50 rounded-lg"><Icon name="trash-2" size={18} /></button>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredStats.length === 0 && (
                                            <tr>
                                                <td colSpan="6" className="px-6 py-12 text-center text-gray-400">目前尚無合約紀錄，請點擊上方「新增合約」開始。</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-lg">{showModal.type === 'contract' ? '新增合約' : '款項記帳'}</h3>
                                    <button onClick={() => setShowModal(null)} className="text-gray-400">✕</button>
                                </div>
                                <div className="p-6 space-y-4">
                                    {showModal.type === 'contract' ? (
                                        <>
                                            <input type="text" placeholder="合約名稱" className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, name: e.target.value})} />
                                            <input type="text" placeholder="業主名稱" className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, owner: e.target.value})} />
                                            <input type="number" placeholder="總金額" className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, totalAmount: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="flex flex-col gap-1">
                                                    <label className="text-[10px] text-gray-400 ml-1">保留款 %</label>
                                                    <input type="number" defaultValue="10" className="p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, retentionRate: e.target.value})} />
                                                </div>
                                                <div className="flex flex-col gap-1">
                                                    <label className="text-[10px] text-gray-400 ml-1">保留款到期日</label>
                                                    <input type="date" className="p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, retentionExpiry: e.target.value})} />
                                                </div>
                                            </div>
                                            <button onClick={handleSaveContract} className="w-full py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg">建立合約</button>
                                        </>
                                    ) : (
                                        <>
                                            <select className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, type: e.target.value === '業主' ? 'owner' : 'vendor'})}>
                                                <option value="業主">業主付款 (收入)</option>
                                                <option value="廠商">廠商付款 (支出)</option>
                                            </select>
                                            <input type="number" placeholder="金額" className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, amount: e.target.value})} />
                                            <input type="text" placeholder="發票號碼" className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, invoiceNo: e.target.value})} />
                                            <input type="date" className="w-full p-3 bg-gray-50 border rounded-xl" onChange={e => setFormData({...formData, invoiceDate: e.target.value})} />
                                            <button onClick={handleSavePayment} className="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg">儲存紀錄</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
